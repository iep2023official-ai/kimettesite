<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>최신 소식 — Kimcolor</title>
  <meta name="description" content="Kimcolor의 최신 뉴스, 보도자료, 그리고 언론 보도를 확인하세요.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
</head>
<body>

  <nav id="nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo"><img src="kimcolorlogo.png" alt="Kimette" style="height: 56px; vertical-align: middle;"></a>
      <div class="nav-links">
        <a href="process.html">원료 공정</a>
        <a href="technology.html">기술 원료</a>
        <a href="applications.html">적용 제형</a>
        <a href="news.html" class="nav-active">최신 소식</a>
        <a href="contact.html" class="nav-cta">문의하기</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="메뉴" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="process.html" class="mobile-link">원료 공정</a>
      <a href="technology.html" class="mobile-link">기술 원료</a>
      <a href="applications.html" class="mobile-link">적용 사례</a>
      <a href="news.html" class="mobile-link">최신 소식</a>
      <a href="contact.html" class="mobile-link mobile-link-cta">문의하기</a>
    </div>
  </nav>

  <section class="page-hero" style="background: var(--dark); padding: 80px 0 60px;">
    <div class="container">
      <div class="page-hero-content fade-in" style="opacity: 1;">
        <div style="font-size: clamp(0.875rem, 2vw, 1.2rem); letter-spacing: 0.05em; text-transform: uppercase; color: var(--magenta-bright); margin-bottom: 20px; font-weight: 500;">News</div>
        <h1 style="font-size: clamp(1.8rem, 3.4vw, 3.2rem); font-weight: 800; margin: 0; line-height: 1.2;">Kimcolor의 최신 뉴스</h1>
      </div>
    </div>
  </section>

  <section id="news" style="padding: 80px 0; background: var(--dark);">
    <div class="container">
      <div id="news-grid" style="display: grid; gap: 40px; margin-top: 40px;">
        <div style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); color: var(--text-muted-dk);">로딩 중...</div>
      </div>
    </div>
  </section>

  <section style="padding: 80px 0; background: var(--dark);">
    <div class="container">
      <div class="app-cta fade-in" style="margin-top: 0;">
        <div>
          <p class="app-cta-title">문의 사항이 있으신가요?</p>
          <p>Kimcolor에 대해 더 알아보고 싶으시거나, 협력 제안이 있으시면 언제든지 문의해주세요.</p>
        </div>
        <a href="contact.html" class="btn btn-primary">문의하기 →</a>
      </div>
    </div>
  </section>

  <footer>
    <div class="container footer-inner">
      <span class="footer-logo"><img src="kimcolorlogo.png" alt="Kimette" style="height: 36px; vertical-align: middle;"></span>
      <span class="footer-copy">© 2025 Kimcolor. All rights reserved.</span>
      <a href="mailto:iep2023official@gmail.com" class="footer-email">iep2023official@gmail.com</a>
    </div>
  </footer>

  <script>
  async function loadNews() {
    const newsGrid = document.getElementById('news-grid');
    try {
      const response = await fetch('https://api.github.com/repos/iep2023official-ai/kimettesite/contents/_news');
      const files = await response.json();

      if (!Array.isArray(files) || files.length === 0) {
        newsGrid.innerHTML = '<div style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); color: var(--text-muted-dk);">최신 소식 준비 중입니다.</div>';
        return;
      }

      const mdFiles = files.filter(f => f.name.endsWith('.md'))
                           .sort((a, b) => b.name.localeCompare(a.name));
      let newsHTML = '';

      for (const file of mdFiles) {
        const res = await fetch(encodeURI(file.download_url));
        const markdown = await res.text();
        const lines = markdown.split('\n');
        let fm = {}, inFM = false, fmEnd = 0;

        for (let i = 0; i < lines.length; i++) {
          if (lines[i].trim() === '---') {
            if (!inFM) { inFM = true; }
            else { fmEnd = i + 1; break; }
          } else if (inFM && lines[i].includes(':')) {
            const ci = lines[i].indexOf(':');
            fm[lines[i].slice(0, ci).trim()] = lines[i].slice(ci + 1).trim();
          }
        }

        const body = lines.slice(fmEnd).join('\n');
        const html = marked.parse(body);
        const date = fm.date ? new Date(fm.date).toLocaleDateString('ko-KR') : '';

        newsHTML += `
          <div style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); transition: all 0.22s ease; opacity: 1; transform: none;">

            <div style="color: var(--text-muted-dk); font-size: 0.9rem; margin-bottom: 12px;">${date}${fm.category ? ' · ' + fm.category : ''}</div>
            <h3 style="font-size: 1.4rem; margin: 0 0 16px; color: var(--text-dk);">${fm.title || '제목 없음'}</h3>
            <div style="color: var(--text-muted-dk); line-height: 1.7; margin-bottom: 16px;">${html}</div>
            ${fm.link ? '<a href="' + fm.link + '" target="_blank" style="color: var(--magenta-bright); text-decoration: none;">자세히 보기 →</a>' : ''}
          </div>`;
      }

      newsGrid.innerHTML = newsHTML;

    } catch (e) {
      console.error(e);
      newsGrid.innerHTML = '<div style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); color: var(--text-muted-dk);">게시물을 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</div>';
    }
  }
  document.addEventListener('DOMContentLoaded', loadNews);
  </script>

  <script src="script.js"></script>
</body>
</html>
